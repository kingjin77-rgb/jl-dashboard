<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>법무법인 제이엘 · 입예협 통합관리</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
:root{
  /* ═══ 법무법인 제이엘 브랜드 컬러 (네이비 블루 + 골드) ═══ */
  --navy-900:#060E1F; --navy-800:#0B1830; --navy-700:#122448; --navy-600:#1B3568;
  --blue-500:#2C5AA0; --blue-400:#3D74C4; --blue-300:#5B94E8; --blue-200:#8FB6F5; --blue-100:#DCE9FC;
  --gold-500:#C9A227; --gold-400:#DDBB4E; --gold-soft:#FBF3D9;
  --ink:#0B1830; --ink2:#2A3A56; --ink3:#5B6B8C; --ink4:#94A3C0; --ink5:#E1E8F5;
  --bg:#F4F7FD; --surface:#FFFFFF; --surface2:#EEF3FC;
  --red:#C0392B; --red-soft:#FDEEEC;
  --r:14px; --r-sm:9px; --r-lg:20px;
  --sh:0 2px 8px rgba(11,24,48,.06),0 1px 2px rgba(11,24,48,.04);
  --sh-md:0 14px 40px rgba(6,14,31,.45);
  --sh-glow:0 0 0 1px rgba(91,148,232,.15),0 8px 30px rgba(44,90,160,.2);
  --font-display:'Pretendard',-apple-system,sans-serif;
  --font:'Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.6;
  -webkit-font-smoothing:antialiased;background:var(--navy-900);
  background-image:
    radial-gradient(ellipse 1000px 600px at 15% -10%, rgba(44,90,160,.35), transparent 60%),
    radial-gradient(ellipse 800px 500px at 105% 10%, rgba(91,148,232,.18), transparent 55%),
    radial-gradient(ellipse 900px 700px at 50% 120%, rgba(19,49,92,.4), transparent 60%);
  background-attachment:fixed;
  overflow-x:hidden;
}
button,input,textarea{font-family:var(--font)}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:9px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:5px}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatGlow{0%,100%{transform:translate(0,0)}50%{transform:translate(-14px,10px)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes popIn{0%{transform:scale(.85);opacity:0}70%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ===== 잠금화면 ===== */
#lockScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative}
.lock-orb{position:absolute;width:480px;height:480px;border-radius:50%;background:radial-gradient(circle,rgba(61,116,196,.35),transparent 70%);filter:blur(20px);animation:floatGlow 9s ease-in-out infinite;pointer-events:none}
.lock-card{max-width:410px;width:100%;background:rgba(11,24,48,.55);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);border-radius:var(--r-lg);padding:42px 36px;box-shadow:var(--sh-md);text-align:center;position:relative;animation:fadeUp .6s cubic-bezier(.2,.8,.2,1)}
.lock-emblem{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--blue-500),var(--navy-600));display:flex;align-items:center;justify-content:center;color:#fff;font-size:25px;font-weight:900;margin:0 auto 20px;box-shadow:0 10px 28px rgba(44,90,160,.5);position:relative}
.lock-emblem::after{content:"";position:absolute;inset:-2px;border-radius:20px;background:linear-gradient(135deg,var(--gold-400),transparent 60%);z-index:-1;opacity:.6}
.lock-t1{font-size:11px;font-weight:800;color:var(--gold-400);letter-spacing:.16em;text-transform:uppercase;margin-bottom:8px}
.lock-t2{font-size:20px;font-weight:900;color:#fff;letter-spacing:-.02em;margin-bottom:26px}
.lock-input{width:100%;padding:15px;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#fff;border-radius:var(--r-sm);text-align:center;letter-spacing:.3em;font-size:19px;font-weight:700;margin-bottom:14px;transition:.2s}
.lock-input::placeholder{color:rgba(255,255,255,.3);letter-spacing:0;font-size:14px;font-weight:500}
.lock-input:focus{outline:none;border-color:var(--blue-300);box-shadow:0 0 0 4px rgba(91,148,232,.18);background:rgba(255,255,255,.09)}
.lock-btn{width:100%;padding:15px;border-radius:var(--r-sm);background:linear-gradient(135deg,var(--blue-500),var(--blue-400));color:#fff;font-weight:800;font-size:14.5px;cursor:pointer;transition:.2s;box-shadow:0 8px 22px rgba(44,90,160,.4)}
.lock-btn:hover{filter:brightness(1.12);transform:translateY(-1px)}
.lock-note{font-size:11.5px;color:rgba(255,255,255,.35);margin-top:18px;line-height:1.65}

/* ===== 대시보드 ===== */
#dash{display:none;min-height:100vh;position:relative;z-index:1}
.topbar{padding:30px 36px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;animation:fadeUp .5s ease}
.brand-row{display:flex;align-items:center;gap:13px}
.brand-emblem{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,var(--blue-500),var(--navy-600));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:17px;flex-shrink:0;box-shadow:0 8px 22px rgba(44,90,160,.45);position:relative}
.brand-emblem::after{content:"";position:absolute;top:-1px;right:-1px;width:11px;height:11px;border-radius:50%;background:var(--gold-400);box-shadow:0 0 10px rgba(221,187,78,.7)}
.brand-title{font-size:17.5px;font-weight:900;color:#fff;letter-spacing:-.02em}
.brand-sub{font-size:11.5px;color:rgba(255,255,255,.42);margin-top:2px;font-weight:500}
.topbar-right{display:flex;align-items:center;gap:10px}
.pill{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.82);border-radius:20px;padding:7px 14px;font-size:12px;font-weight:600}
.pill-dot{width:7px;height:7px;border-radius:50%;background:#3DDC97;box-shadow:0 0 8px rgba(61,220,151,.8);animation:pulse 2.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.refresh-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:#fff;border-radius:var(--r-sm);padding:9px 16px;font-size:12.5px;font-weight:700;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:6px}
.refresh-btn:hover{background:rgba(255,255,255,.14);transform:translateY(-1px)}
.refresh-btn.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.content{max-width:1280px;margin:0 auto;padding:8px 36px 70px}

/* 전체 요약 - 글래스모피즘 */
.mini-summary{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:26px;padding:14px 20px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:var(--r);backdrop-filter:blur(12px);animation:fadeUp .5s ease}
.mini-item{display:flex;align-items:center;gap:8px}
.mini-ico{font-size:15px;opacity:.7}
.mini-lb{font-size:12px;color:rgba(255,255,255,.45);font-weight:600}
.mini-v{font-size:14px;color:#fff;font-weight:800}

/* 섹션 헤더 */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;animation:fadeUp .5s ease .2s backwards}
.sec-t{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.sec-t .bar{width:4px;height:16px;background:linear-gradient(180deg,var(--gold-400),var(--blue-400));border-radius:2px}
.sec-m{font-size:12px;color:rgba(255,255,255,.4)}

/* 단지 카드 그리드 */
.complex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px}
.complex-card{background:var(--surface);border-radius:var(--r-lg);padding:24px;box-shadow:var(--sh-md);position:relative;overflow:hidden;transition:transform .25s cubic-bezier(.2,.8,.2,1),box-shadow .25s;animation:popIn .5s cubic-bezier(.2,.8,.2,1) backwards}
.complex-card:nth-child(1){animation-delay:.25s}
.complex-card:nth-child(2){animation-delay:.32s}
.complex-card:nth-child(3){animation-delay:.39s}
.complex-card:hover{transform:translateY(-5px);box-shadow:0 20px 50px rgba(6,14,31,.55)}
.complex-card::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--blue-500),var(--gold-400))}
.cc-sample-badge{position:absolute;top:16px;left:16px;font-size:9px;font-weight:800;padding:3px 8px;border-radius:8px;background:var(--gold-soft);color:var(--gold-500);letter-spacing:.04em}
.cc-top{display:flex;align-items:center;gap:12px;margin-bottom:18px;margin-top:6px}
.cc-emblem{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:16px;flex-shrink:0;box-shadow:0 6px 16px rgba(0,0,0,.18)}
.cc-name{font-size:14.5px;font-weight:800;color:var(--ink);letter-spacing:-.01em;line-height:1.3}
.cc-loc{font-size:11px;color:var(--ink4);margin-top:2px;font-weight:500}
.cc-body{display:flex;align-items:center;gap:18px;margin-bottom:14px}
.cc-donut{position:relative;flex-shrink:0}
.cc-donut-c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.cc-donut-p{font-size:17px;font-weight:900;letter-spacing:-.02em}
.cc-stats{flex:1;display:flex;flex-direction:column;gap:7px}
.cc-stat-row{display:flex;justify-content:space-between;font-size:12px}
.cc-stat-row .k{color:var(--ink3);font-weight:500}
.cc-stat-row .v{font-weight:800;color:var(--ink)}

/* 세그먼트 바 그래프 */
.cc-graph{margin-bottom:16px}
.cc-graph-bar{height:9px;border-radius:5px;overflow:hidden;display:flex;background:var(--ink5)}
.cc-graph-seg{height:100%;transition:width 1s cubic-bezier(.2,.8,.2,1)}
.cc-graph-legend{display:flex;gap:12px;margin-top:8px;font-size:10.5px;color:var(--ink3);flex-wrap:wrap}
.cc-graph-legend span{display:inline-flex;align-items:center;gap:4px}
.cc-graph-legend i{width:7px;height:7px;border-radius:2px;display:inline-block}

.cc-actions{display:flex;gap:8px;margin-bottom:10px}
.cc-btn{flex:1;text-align:center;padding:10px;border-radius:var(--r-sm);font-size:12.5px;font-weight:700;cursor:pointer;transition:.18s}
.cc-btn-primary{background:linear-gradient(135deg,var(--blue-500),var(--navy-600));color:#fff}
.cc-btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.cc-btn-ghost{background:var(--surface2);color:var(--ink2);border:1px solid var(--ink5)}
.cc-btn-ghost:hover{border-color:var(--blue-400);color:var(--blue-500)}
.cc-status{position:absolute;top:16px;right:16px;font-size:9.5px;font-weight:800;padding:3px 9px;border-radius:10px;z-index:2}
.cc-status.ok{background:#DCFCE7;color:#15803D}
.cc-status.err{background:var(--red-soft);color:var(--red)}
.cc-status.loading{background:var(--surface2);color:var(--ink4)}

/* 메모란 */
/* 집단대출 접수 실시간 상황판 */
.loan-board{background:linear-gradient(135deg,var(--surface2),#F7FAFF);border:1px solid var(--ink5);border-radius:var(--r);padding:14px 16px;margin-bottom:12px}
.loan-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.loan-t{font-size:12px;font-weight:800;color:var(--ink2)}
.loan-edit-btn{font-size:10.5px;font-weight:700;color:var(--blue-500);background:none;border:1px solid var(--blue-200);border-radius:6px;padding:3px 9px;cursor:pointer;transition:.15s}
.loan-edit-btn:hover{background:var(--blue-100)}
.loan-display{display:block}
.loan-num{display:flex;align-items:baseline;gap:4px;margin-bottom:8px}
.loan-num span:first-child{font-size:26px;font-weight:900;color:var(--ink);letter-spacing:-.02em}
.loan-unit{font-size:13px;color:var(--ink4);font-weight:600}
.loan-bar-track{height:8px;background:var(--ink5);border-radius:5px;overflow:hidden;margin-bottom:6px}
.loan-bar-fill{height:100%;border-radius:5px;transition:width 1s cubic-bezier(.2,.8,.2,1)}
.loan-pct{font-size:11px;color:var(--ink3);font-weight:600}
.loan-edit{display:none;gap:8px;margin-top:4px}
.loan-edit.open{display:flex}
.loan-edit.open + .loan-updated{margin-top:6px}
.loan-input{flex:1;padding:9px 11px;border:1.5px solid var(--ink5);border-radius:var(--r-sm);font-size:13px;font-weight:600}
.loan-input:focus{outline:none;border-color:var(--blue-400);box-shadow:0 0 0 3px var(--blue-100)}
.loan-save-btn{padding:9px 16px;border-radius:var(--r-sm);background:var(--ink);color:#fff;font-size:12px;font-weight:700;cursor:pointer;transition:.15s}
.loan-save-btn:hover{background:var(--blue-500)}
.loan-updated{font-size:10px;color:var(--ink4);margin-top:2px}

.cc-memo-toggle{width:100%;text-align:left;padding:9px 12px;border-radius:var(--r-sm);background:var(--surface2);border:1px solid var(--ink5);font-size:11.5px;font-weight:700;color:var(--ink3);cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:.15s}
.cc-memo-toggle:hover{border-color:var(--blue-300);color:var(--blue-500)}
.cc-memo-box{display:none;margin-top:8px}
.cc-memo-box.open{display:block}
.cc-memo-textarea{width:100%;min-height:80px;padding:10px 12px;border:1.5px solid var(--ink5);border-radius:var(--r-sm);font-size:12.5px;font-family:var(--font);resize:vertical;color:var(--ink2);line-height:1.6}
.cc-memo-textarea:focus{outline:none;border-color:var(--blue-400);box-shadow:0 0 0 3px var(--blue-100)}
.cc-memo-save{margin-top:7px;width:100%;padding:8px;border-radius:var(--r-sm);background:var(--ink);color:#fff;font-size:11.5px;font-weight:700;cursor:pointer;transition:.15s}
.cc-memo-save:hover{background:var(--blue-500)}
.cc-memo-saved{font-size:10.5px;color:var(--ink4);margin-top:5px;text-align:center}

/* 추가 안내 카드 */
.add-card{border:2px dashed rgba(255,255,255,.18);border-radius:var(--r-lg);padding:28px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;min-height:230px;animation:fadeUp .5s ease .45s backwards}
.add-icon{font-size:28px;opacity:.5}
.add-t{font-size:13.5px;font-weight:700;color:rgba(255,255,255,.6)}
.add-d{font-size:11.5px;color:rgba(255,255,255,.32);line-height:1.65;max-width:230px}

.footer-note{text-align:center;font-size:11px;color:rgba(255,255,255,.25);padding:34px 0 10px}

@media(max-width:720px){
  .summary-grid{grid-template-columns:1fr 1fr}
  .topbar{padding:22px 20px 16px}
  .content{padding:8px 20px 60px}
}
</style>
</head>
<body>

<!-- ===== 잠금화면 ===== -->
<div id="lockScreen">
  <div class="lock-orb" style="top:-100px;left:-100px"></div>
  <div class="lock-orb" style="bottom:-140px;right:-100px;animation-delay:3s"></div>
  <div class="lock-card">
    <div class="lock-emblem">JL</div>
    <div class="lock-t1">Internal Access Only</div>
    <div class="lock-t2">입예협 통합관리 대시보드</div>
    <input type="password" id="pinInput" class="lock-input" placeholder="접속 코드" maxlength="16" onkeydown="if(event.key==='Enter')unlock()">
    <button class="lock-btn" onclick="unlock()">접속하기</button>
    <div class="lock-note">법무법인 제이엘 임직원 전용 관리 도구입니다.<br>외부 공유 및 접속 코드 노출을 금지합니다.</div>
  </div>
</div>

<!-- ===== 대시보드 ===== -->
<div id="dash">
  <div class="topbar">
    <div class="brand-row">
      <div class="brand-emblem">JL</div>
      <div>
        <div class="brand-title">법무법인 제이엘 · 입예협 통합관리</div>
        <div class="brand-sub">전체 관리단지 현황을 한 화면에서 확인합니다</div>
      </div>
    </div>
    <div class="topbar-right">
      <span class="pill"><span class="pill-dot"></span><span id="lastUpdate">업데이트 중…</span></span>
      <button class="refresh-btn" id="refreshBtn" onclick="refreshAll()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 4v6h6M20 20v-6h-6"/><path d="M20 10a8 8 0 00-14.6-3.4M4 14a8 8 0 0014.6 3.4"/></svg>
        새로고침
      </button>
    </div>
  </div>

  <div class="content">
    <div class="mini-summary">
      <div class="mini-item"><span class="mini-ico">🏢</span><span class="mini-lb">관리 단지</span><span class="mini-v" id="sumComplexes">0개</span></div>
      <div class="mini-item"><span class="mini-ico">🕐</span><span class="mini-lb">마지막 업데이트</span><span class="mini-v" id="lastUpdate2">-</span></div>
    </div>

    <div class="sec-hd">
      <div class="sec-t"><span class="bar"></span>관리 단지 목록</div>
      <div class="sec-m" id="complexCount">0개 단지</div>
    </div>
    <div class="complex-grid" id="complexGrid"></div>

    <div class="footer-note">법무법인 제이엘 내부 관리 도구 · 각 단지 데이터는 해당 단지 GitHub 저장소에서 실시간 조회됩니다</div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   단지 목록 설정 — 새 단지 추가 시 이 배열에 항목만 추가하면 됩니다
   sample:true 인 단지는 실제 GitHub 조회 없이 예시 데이터를 표시합니다 (데모용)
   ═══════════════════════════════════════════ */
const COMPLEXES = [
  {
    name: '에코델타시티 푸르지오 트레파크',
    location: '부산 강서구',
    ghOwner: 'kingjin77-rgb',
    ghRepo: 'trepark-ipyehyeop',
    siteUrl: 'https://kingjin77-rgb.github.io/trepark-ipyehyeop/',
    totalUnits: 1370,
    themeColor: '#0D5C30'
  },
  {
    name: '동탄역 롯데캐슬 (예시)',
    location: '화성 동탄',
    sample: true,
    sampleData: { done: 612, agree: 570, deny: 42, totalUnits: 980 },
    siteUrl: '#',
    totalUnits: 980,
    themeColor: '#8B2E2E'
  },
  {
    name: '평택 고덕 자이 (예시)',
    location: '평택 고덕',
    sample: true,
    sampleData: { done: 205, agree: 180, deny: 25, totalUnits: 890 },
    siteUrl: '#',
    totalUnits: 890,
    themeColor: '#1B3568'
  }
  // 새 단지 추가 예시:
  // {
  //   name: '단지명', location: '지역',
  //   ghOwner: 'GitHub계정', ghRepo: '저장소명',
  //   siteUrl: 'https://계정.github.io/저장소명/',
  //   totalUnits: 세대수, themeColor: '#브랜드색상'
  // }
];

const MASTER_PIN = 'jl2026admin';

function unlock(){
  const v = document.getElementById('pinInput').value;
  if(v === MASTER_PIN){
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('dash').style.display = 'block';
    renderComplexCards();
    refreshAll();
  } else {
    alert('접속 코드가 올바르지 않습니다');
  }
}

function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}

/* 숫자 카운트업 애니메이션 */
function countUp(el, target, suffix, duration){
  duration = duration || 900;
  const start = 0, startTime = performance.now();
  function tick(now){
    const p = Math.min((now-startTime)/duration, 1);
    const eased = 1 - Math.pow(1-p, 3);
    const val = Math.round(start + (target-start)*eased);
    el.innerHTML = val.toLocaleString() + (suffix||'');
    if(p<1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

/* ═══ 메모 (현재: 이 브라우저에만 저장 / 추후 서버 연동시 전체 공유 가능) ═══ */
function toggleMemo(i){
  const box = document.getElementById(`memo-box-${i}`);
  const arrow = document.getElementById(`memo-arrow-${i}`);
  const open = box.classList.toggle('open');
  arrow.textContent = open ? '▴' : '▾';
}
function loadMemo(i){
  const key = 'jl_memo_' + COMPLEXES[i].name;
  const saved = localStorage.getItem(key);
  if(saved){
    document.getElementById(`memo-text-${i}`).value = saved;
    document.getElementById(`memo-saved-${i}`).textContent = '이 기기에 저장됨';
  }
  loadLoan(i);
}
function saveMemo(i){
  const key = 'jl_memo_' + COMPLEXES[i].name;
  const val = document.getElementById(`memo-text-${i}`).value;
  localStorage.setItem(key, val);
  const savedEl = document.getElementById(`memo-saved-${i}`);
  savedEl.textContent = '✓ 저장되었습니다 (' + new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) + ')';
}

/* ═══ 집단대출 접수 현황 (수동 입력 · 실시간 상황판) ═══ */
function loanKey(i){ return 'jl_loan_' + COMPLEXES[i].name; }
function loadLoan(i){
  const raw = localStorage.getItem(loanKey(i));
  const data = raw ? JSON.parse(raw) : {val:0, updated:null};
  updateLoanDisplay(i, data);
}
function updateLoanDisplay(i, data){
  const c = COMPLEXES[i];
  const pct = c.totalUnits ? Math.round(data.val/c.totalUnits*1000)/10 : 0;
  countUp(document.getElementById(`loan-val-${i}`), data.val, '', 700);
  document.getElementById(`loan-bar-${i}`).style.width = Math.min(pct,100)+'%';
  document.getElementById(`loan-pct-${i}`).textContent = pct + '% 접수 (' + c.totalUnits.toLocaleString() + '세대 중)';
  document.getElementById(`loan-updated-${i}`).textContent = data.updated ? '마지막 입력: ' + data.updated : '아직 입력된 데이터가 없습니다';
}
function toggleLoanEdit(i){
  const editBox = document.getElementById(`loan-edit-${i}`);
  const open = editBox.classList.toggle('open');
  document.getElementById(`loan-edit-btn-${i}`).textContent = open ? '취소' : '수정';
  if(open){
    const raw = localStorage.getItem(loanKey(i));
    const data = raw ? JSON.parse(raw) : {val:0};
    document.getElementById(`loan-input-${i}`).value = data.val || '';
    document.getElementById(`loan-input-${i}`).focus();
  }
}
function saveLoan(i){
  const input = document.getElementById(`loan-input-${i}`);
  const val = Math.max(0, parseInt(input.value)||0);
  const now = new Date().toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  const data = {val, updated: now};
  localStorage.setItem(loanKey(i), JSON.stringify(data));
  updateLoanDisplay(i, data);
  toggleLoanEdit(i);
}

/* ═══ 통계 조회 ═══ */
const CACHE_MS = 3 * 60 * 1000;
const statsCache = {};

async function fetchComplexStats(c, idx){
  if(c.sample){
    const d = c.sampleData;
    const rate = d.totalUnits ? Math.round(d.done/d.totalUnits*1000)/10 : 0;
    return {ok:true, done:d.done, agree:d.agree, deny:d.deny, left:d.totalUnits-d.done, rate};
  }
  const cacheKey = c.ghOwner+'/'+c.ghRepo;
  const cached = statsCache[cacheKey];
  if(cached && (Date.now()-cached.ts) < CACHE_MS) return cached.data;
  try{
    let page=1, agree=0, deny=0;
    const label = encodeURIComponent('위임장');
    while(page<=5){
      const r = await fetch(`https://api.github.com/repos/${c.ghOwner}/${c.ghRepo}/issues?labels=${label}&state=all&per_page=100&page=${page}`);
      if(r.status===403) throw new Error('rate-limited');
      if(!r.ok) throw new Error('fetch failed');
      const items = await r.json();
      if(!Array.isArray(items)) throw new Error('unexpected response');
      items.forEach(issue=>{
        const labels = issue.labels.map(l=>l.name);
        if(labels.includes('동의')) agree++;
        else if(labels.includes('미동의')) deny++;
      });
      if(items.length < 100) break;
      page++;
    }
    const done = agree + deny;
    const rate = c.totalUnits ? Math.round(done/c.totalUnits*1000)/10 : 0;
    const result = {ok:true, done, agree, deny, left: c.totalUnits-done, rate};
    statsCache[cacheKey] = {ts:Date.now(), data:result};
    return result;
  }catch(e){
    console.warn('통계 조회 실패:', c.name, e.message);
    return {ok:false, reason:e.message};
  }
}

async function refreshAll(){
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('lastUpdate').textContent = '조회 중…';

  const results = await Promise.all(COMPLEXES.map((c,i)=>fetchComplexStats(c,i)));

  results.forEach((res, i)=>{
    const c = COMPLEXES[i];
    const statusEl = document.getElementById(`status-${i}`);
    if(res.ok){
      statusEl.textContent = c.sample?'예시':'정상'; statusEl.className = 'cc-status ok';
      countUp(document.getElementById(`done-${i}`), res.done, '세대', 800);
      countUp(document.getElementById(`left-${i}`), res.left, '세대', 800);
      document.getElementById(`pct-${i}`).textContent = res.rate + '%';
      const circ = 182, dash = circ*(Math.min(res.rate,100)/100);
      document.getElementById(`donut-${i}`).setAttribute('stroke-dasharray', dash+' '+(circ-dash));
      const agreePct = res.done? res.agree/c.totalUnits*100 : 0;
      const denyPct = res.done? res.deny/c.totalUnits*100 : 0;
      document.getElementById(`seg-agree-${i}`).style.width = agreePct+'%';
      document.getElementById(`seg-deny-${i}`).style.width = denyPct+'%';
      document.getElementById(`seg-left-${i}`).style.width = Math.max(0,100-agreePct-denyPct)+'%';
    } else {
      const isRateLimit = res.reason==='rate-limited';
      statusEl.textContent = isRateLimit?'요청제한':'오류'; statusEl.className = 'cc-status err';
      document.getElementById(`done-${i}`).textContent = isRateLimit?'잠시 후 재시도':'조회실패';
      document.getElementById(`left-${i}`).textContent = '-';
    }
  });

  document.getElementById('sumComplexes').textContent = COMPLEXES.length + '개';
  const now = new Date();
  const timeStr = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  document.getElementById('lastUpdate').textContent = timeStr + ' 업데이트';
  document.getElementById('lastUpdate2').textContent = timeStr;
  btn.classList.remove('spinning');
}
